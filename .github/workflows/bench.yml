name: Benchmark

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # gitlab.inria.fr/core-math/core-math pinned commit.  Keep this in sync with
  # oracle.yml so both workflows share one repo-scoped cache entry.
  CORE_MATH_REF: 646e6ce4fcc29ace08b9c28de30e3283a0e6dd65

# Run benchmarks on every push to main and on manual dispatch.
# Results are stored in the gh-pages branch and visualised at
# https://jdh8.github.io/metallic/dev/bench/
# Requires GitHub Pages to be enabled (Settings → Pages → gh-pages / root).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # benchmark-action pushes JSON to gh-pages

jobs:
  # fma and nofma run in parallel as a two-element matrix; both need CORE-MATH.
  bench-cr:
    name: Benchmark ${{ matrix.fp-model }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fp-model: [fma, nofma]

    steps:
      - uses: actions/checkout@v6

      # CORE-MATH is required for the 19 correctly-rounded float function
      # benchmarks.  Restore it to the parent of src/ so the Makefile default
      # CORE_MATH ?= $(HOME)/src/core-math-sys/vendor/src resolves to the
      # src/ subdirectory where binary32/<func>/<funcf>.c lives.  Shares the
      # pinned-SHA cache key with oracle.yml; the clone below runs only on a
      # cold cache (see the eviction caveat there).
      - name: Cache CORE-MATH
        id: coremath
        uses: actions/cache@v5
        with:
          path: ~/src/core-math-sys/vendor
          key: core-math-${{ env.CORE_MATH_REF }}
      - name: Clone CORE-MATH
        if: steps.coremath.outputs.cache-hit != 'true'
        run: |
          dst="${HOME}/src/core-math-sys/vendor"
          git init -q "${dst}"
          git -C "${dst}" remote add origin https://gitlab.inria.fr/core-math/core-math.git
          git -C "${dst}" fetch -q --depth=1 origin "${CORE_MATH_REF}"
          git -C "${dst}" checkout -q FETCH_HEAD

      # -j$(nproc) compiles all 19 CR benchmarks in parallel and runs them in
      # parallel.  Each executable writes one self-contained line, so interleaved
      # output still parses correctly.
      - name: Run ${{ matrix.fp-model }} benchmarks
        run: make -j$(nproc) bench.${{ matrix.fp-model }} 2>&1 | tee bench_${{ matrix.fp-model }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.fp-model }}
          path: bench_${{ matrix.fp-model }}.txt

  # libm benchmarks don't need CORE-MATH and run fully in parallel with bench-cr.
  bench-libm:
    name: Benchmark libm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run libm benchmarks
        run: make -j$(nproc) bench.libm 2>&1 | tee bench_libm.txt

      - uses: actions/upload-artifact@v4
        with:
          name: bench-libm
          path: bench_libm.txt

  publish:
    needs: [bench-cr, bench-libm]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Create an empty orphan gh-pages branch on the very first workflow run;
      # subsequent runs find the branch via ls-remote and skip.
      # git commit-tree with the well-known empty-tree SHA avoids touching the
      # working tree or switching branches.
      - name: Ensure gh-pages branch
        run: |
          if ! git ls-remote --exit-code origin gh-pages; then
            commit=$(
              GIT_AUTHOR_NAME='github-actions[bot]' \
              GIT_AUTHOR_EMAIL='github-actions[bot]@users.noreply.github.com' \
              GIT_COMMITTER_NAME='github-actions[bot]' \
              GIT_COMMITTER_EMAIL='github-actions[bot]@users.noreply.github.com' \
              git commit-tree 4b825dc642cb6eb9a060e54bf8d69288fbee4904 \
                -m 'Initialize gh-pages'
            )
            git push origin "${commit}:refs/heads/gh-pages"
          fi

      - name: Download benchmark outputs
        uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          merge-multiple: true
          path: .

      - name: Parse benchmark output to JSON
        run: |
          cat bench_fma.txt bench_nofma.txt bench_libm.txt \
            | python3 scripts/parse_bench.py > bench.json
          cat bench.json

      # Stores history in gh-pages branch at dev/bench/data.js.
      # The chart at https://jdh8.github.io/metallic/dev/bench/ shows sweep
      # times (seconds) over commits — lower is faster for Metallic.
      - name: Publish to GitHub Pages
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Metallic math benchmarks
          tool: customSmallerIsBetter
          output-file-path: bench.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Warn (but don't fail) if a function regresses by more than 20%.
          alert-threshold: "120%"
          comment-on-alert: true
          fail-on-alert: false
