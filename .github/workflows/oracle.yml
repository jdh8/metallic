name: Oracle

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # gitlab.inria.fr/core-math/core-math pinned commit.  A fixed SHA makes the
  # cache key stable (so warm runs never re-clone) and the gate reproducible.
  # Bump with: git ls-remote https://gitlab.inria.fr/core-math/core-math.git HEAD
  CORE_MATH_REF: 646e6ce4fcc29ace08b9c28de30e3283a0e6dd65

# Correct-rounding gate for the correctly-rounded float functions (Makefile
# ORACLE.cr).  Each job is a bit-for-bit cross-check against CORE-MATH's
# correctly-rounded cr_*: a correctly-rounded function must agree with cr_*
# everywhere, so this is equivalent to an MPFR sweep for catching regressions
# but ~10x faster (no bignum per call).  Unary functions are checked over all
# 2^32 binary32 inputs; the bivariate pair (atan2f, hypotf) is sampled plus
# CORE-MATH's worst-case files (a 2^64 proof is infeasible -- the same way
# CORE-MATH validates them).  This catches the slow-path / Ziv-fallback bugs
# that check.wasm.fast (exact functions only) cannot see.
#
# The independent MPFR ground-truth sweep (make check.oracle.mpfr) is kept for
# development and audits but is too slow to gate, so it is not run here.
#
# One matrix job per function keeps wall-clock at roughly the slowest single
# check rather than their sum, and pinpoints which function regressed.  The
# matrix is derived from `make print.oracle.cr`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: oracle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Derive the function list from the Makefile (ORACLE.cr) so the matrix can
  # never drift from the curated correctly-rounded set.
  matrix:
    runs-on: ubuntu-latest
    outputs:
      fns: ${{ steps.gen.outputs.fns }}
    steps:
      - uses: actions/checkout@v6
      - id: gen
        run: |
          fns=$(make -s print.oracle.cr | tr ' ' '\n' | jq -R . | jq -sc .)
          echo "fns=${fns}" >> "${GITHUB_OUTPUT}"

  # Warm the CORE-MATH cache once.  With fail-fast: false the correct-rounding
  # matrix fans out ~26 jobs; without this, a cold cache would have all of them
  # clone GitLab in parallel and race to save the same key.  Funnelling the cold
  # path through a single job means exactly one GitLab clone per pinned SHA, and
  # the matrix jobs (which `needs:` this) then restore read-only -- so once warm,
  # the gate never touches GitLab.
  coremath:
    runs-on: ubuntu-latest
    steps:
      - name: Cache CORE-MATH
        id: coremath
        uses: actions/cache@v4
        with:
          path: ~/src/core-math-sys/vendor
          key: core-math-${{ env.CORE_MATH_REF }}
      - name: Clone CORE-MATH
        if: steps.coremath.outputs.cache-hit != 'true'
        run: |
          dst="${HOME}/src/core-math-sys/vendor"
          git init -q "${dst}"
          git -C "${dst}" remote add origin https://gitlab.inria.fr/core-math/core-math.git
          git -C "${dst}" fetch -q --depth=1 origin "${CORE_MATH_REF}"
          git -C "${dst}" checkout -q FETCH_HEAD

  correct-rounding:
    needs: [matrix, coremath]
    name: ${{ matrix.fn }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false   # report every regressing function, not just the first
      matrix:
        fn: ${{ fromJson(needs.matrix.outputs.fns) }}

    steps:
      - uses: actions/checkout@v6

      # The cr_* cross-checks use no bignum, so the gate needs only gcc (and its
      # OpenMP runtime libgomp, already on the runner) plus a CORE-MATH checkout
      # -- no libmpfr-dev/libgmp-dev.  (The MPFR audit, check.oracle.mpfr, does
      # need them, but that target is not run here.)
      #
      # CORE-MATH supplies the cr_* implementations the cross-checks compare
      # against.  Restore it to the parent of src/ so the Makefile default
      # CORE_MATH ?= $(HOME)/src/core-math-sys/vendor/src resolves correctly.
      # The `coremath` job warmed this cache, so on the common path this is a
      # pure restore and the clone fallback below never runs.  Caveat: GitHub
      # evicts caches after 7 days idle (and caps a repo at 10 GB), so a cold
      # cache still falls back to GitLab -- caching reduces, not eliminates, the
      # GitLab dependency.
      - name: Cache CORE-MATH
        id: coremath
        uses: actions/cache@v4
        with:
          path: ~/src/core-math-sys/vendor
          key: core-math-${{ env.CORE_MATH_REF }}
      - name: Clone CORE-MATH
        if: steps.coremath.outputs.cache-hit != 'true'
        run: |
          dst="${HOME}/src/core-math-sys/vendor"
          git init -q "${dst}"
          git -C "${dst}" remote add origin https://gitlab.inria.fr/core-math/core-math.git
          git -C "${dst}" fetch -q --depth=1 origin "${CORE_MATH_REF}"
          git -C "${dst}" checkout -q FETCH_HEAD

      # The .exe- target builds the oracle and runs it; the harness exits nonzero
      # on any mismatch, so make (and the job) fails on a correct-rounding bug.
      - name: Verify ${{ matrix.fn }} correctly rounded
        run: make test/oracle/math/float/${{ matrix.fn }}.exe-
